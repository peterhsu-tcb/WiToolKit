<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="WeTools — a redesigned multi-tool workspace inspired by WiToolKit." />
  <meta name="theme-color" content="#0b1020" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f7f8fc" media="(prefers-color-scheme: light)" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237ca0ff'/%3E%3Ctext x='50%25' y='55%25' font-family='Inter,Segoe UI,sans-serif' font-size='18' font-weight='700' fill='white' text-anchor='middle' dominant-baseline='middle'%3EW%3C/text%3E%3C/svg%3E" />
  <title>WeTools</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">W</div>
        <div>
          <h1>WeTools</h1>
          <p class="tagline">Redesigned multi-tool workspace inspired by WiToolKit.</p>
        </div>
      </div>
      <div class="header-actions">
        <a class="icon-btn" href="https://github.com/peterhsu-tcb/WiToolKit" target="_blank" rel="noopener noreferrer" aria-label="Open repository on GitHub" title="Open repository on GitHub">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56v-2c-3.2.7-3.88-1.37-3.88-1.37-.53-1.34-1.3-1.7-1.3-1.7-1.06-.73.08-.71.08-.71 1.18.08 1.8 1.21 1.8 1.21 1.04 1.79 2.74 1.27 3.41.97.11-.76.41-1.27.74-1.56-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.05 0 0 .98-.31 3.2 1.18a11.1 11.1 0 0 1 5.83 0c2.22-1.49 3.2-1.18 3.2-1.18.62 1.59.23 2.76.11 3.05.74.81 1.18 1.84 1.18 3.1 0 4.42-2.69 5.39-5.25 5.68.42.36.79 1.07.79 2.16v3.2c0 .31.21.68.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z"/></svg>
        </a>
      </div>
    </header>

    <div class="layout">
      <nav class="sidebar" aria-label="Tools">
        <p class="sidebar-title">Tools</p>
        <ul class="tools-list" role="list">
          <li>
            <button class="tool-card" type="button" data-tool="File Manager" aria-pressed="false" aria-label="Open File Manager tool">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
              <span>File Manager</span>
            </button>
          </li>
          <li>
            <button class="tool-card" type="button" data-tool="Text Compare" aria-pressed="false" aria-label="Open Text Compare tool">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 5h7v14H4zM13 5h7v14h-7z"/><path d="M7 9h1M7 12h1M7 15h1M16 9h1M16 12h1M16 15h1"/></svg>
              <span>Text Compare</span>
            </button>
          </li>
          <li>
            <button class="tool-card" type="button" data-tool="Media Converter" aria-pressed="false" aria-label="Open Media Converter tool">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m10 9 5 3-5 3z" fill="currentColor" stroke="none"/></svg>
              <span>Media Converter</span>
            </button>
          </li>
          <li>
            <button class="tool-card" type="button" data-tool="PDF Text Extract" aria-pressed="false" aria-label="Open PDF Text Extract tool">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6M8 13h8M8 17h5"/></svg>
              <span>PDF Text Extract</span>
            </button>
          </li>
          <li>
            <button class="tool-card" type="button" data-tool="Agentic Client" aria-pressed="false" aria-label="Open Agentic Client tool">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="7" width="16" height="12" rx="2"/><path d="M12 3v4M9 12h.01M15 12h.01M9 16h6"/></svg>
              <span>Agentic Client</span>
            </button>
          </li>
          <li>
            <button class="tool-card" type="button" data-tool="Media Manager" aria-pressed="false" aria-label="Open Media Manager tool">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M3 9h18M8 13l3 2-3 2zM7 21h10"/></svg>
              <span>Media Manager</span>
            </button>
          </li>
          <li>
            <button class="tool-card" type="button" data-tool="Batch Image Downloader" aria-pressed="false" aria-label="Open Batch Image Downloader tool">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="14" height="11" rx="2"/><path d="m6 12 3-3 3 3 2-2 3 3"/><circle cx="9" cy="8" r="1"/><path d="M21 9v9a2 2 0 0 1-2 2H8"/><path d="M14 17v3M11 19h6"/></svg>
              <span>Batch Image Downloader</span>
            </button>
          </li>
        </ul>
      </nav>

      <section class="workspace" aria-live="polite" aria-label="Tool workspace">
        <div id="workspace-content">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
            <h2 id="selected-title">Select a tool</h2>
            <p id="selected-description">Choose a tool from the sidebar to preview its redesigned workspace.</p>
          </div>
        </div>
      </section>
    </div>

    <footer>WeTools · static preview · no history is recorded</footer>
  </main>

  <script src="./media-manager.js" defer></script>
  <script src="./batch-image-downloader.js" defer></script>
  <script src="./main.js" defer></script>
</body>
</html>
